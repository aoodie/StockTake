name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: pip install -r backend/requirements.txt pytest
      - run: python -m pytest -q
        working-directory: backend
      - run: node --check backend/static/app.js
      - run: node --check backend/static/admin.js
      - run: node --check backend/static/mapping.js
      - run: node --test backend/static/frontend-utils.test.mjs backend/static/scanner-smoke.test.mjs
