<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <title>StockTake</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="stylesheet" href="/styles.css?v=scanner-video-1">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <label for="locationSelect">Location</label>
          <select id="locationSelect"></select>
        </div>
        <div>
          <label>Session</label>
          <strong id="periodLabel"></strong>
          <button class="link-button" id="changeSessionButton" type="button">Change</button>
        </div>
        <div class="sync-pill" id="syncStatus" role="status" aria-live="polite">Offline ready</div>
      </header>

      <section class="scanner-panel" id="scannerPanel">
        <video id="preview" playsinline muted></video>
        <div class="scanner-overlay">
          <div class="auto-scan-badge" id="autoScanBadge">Auto Scan Off</div>
          <button class="icon-button" id="torchButton" type="button" title="Toggle flashlight">Flash</button>
          <button class="wake-button hidden" id="wakeButton" type="button">Tap to Wake Scanner</button>
          <div class="scan-hud hidden" id="scanHud" aria-live="polite"></div>
          <div class="pulse hidden" id="pulse"></div>
        </div>
      </section>

      <section class="mode-row" id="modeRow" role="group" aria-label="Counting mode">
        <button class="mode active" id="multiMode" type="button">Multi-Scan</button>
        <button class="mode" id="bulkMode" type="button">Bulk-Count</button>
      </section>

      <section class="product-card">
        <div class="photo-slot" id="productPhoto">Photo</div>
        <div>
          <h1 id="productName">Ready to scan</h1>
          <p id="productMeta">Scan a barcode or enter one manually.</p>
          <p id="productBin">BIN: -</p>
        </div>
      </section>

      <section class="manual-scan">
        <details class="manual-panel">
          <summary>Manual</summary>
          <div class="manual-controls">
            <input id="manualBarcode" inputmode="numeric" placeholder="Barcode">
            <button id="manualScanButton" type="button">Scan</button>
          </div>
        </details>
        <button id="retryCameraButton" type="button">Retry Camera</button>
      </section>

      <section class="keypad" id="keypad">
        <label for="quantityInput">Quantity</label>
        <input id="quantityInput" inputmode="none" autocomplete="off" placeholder="Qty">
        <output id="quantityDisplay" aria-live="polite">0</output>
        <div class="keys">
          <button data-key="7">7</button><button data-key="8">8</button><button data-key="9">9</button><button data-action="clear">CLEAR</button>
          <button data-key="4">4</button><button data-key="5">5</button><button data-key="6">6</button><button class="confirm" data-action="confirm">CONFIRM & NEXT</button>
          <button data-key="1">1</button><button data-key="2">2</button><button data-key="3">3</button><button class="confirm filler" tabindex="-1"></button>
          <button data-key=".">.</button><button data-key="0">0</button><button data-action="backspace">Del</button><button class="confirm filler" tabindex="-1"></button>
        </div>
      </section>

      <section class="actions">
        <button id="undoButton" type="button">Undo Last Scan</button>
        <button id="linesButton" type="button">Scanned Lines</button>
        <button id="diagnosticsButton" type="button">Diagnostics</button>
        <button id="exportButton" type="button">Export Excel</button>
      </section>
    </main>

    <dialog id="sessionDialog" class="blocking-dialog">
      <form method="dialog" class="dialog-shell session-shell">
        <h2>Start Stocktake</h2>
        <label for="sessionPreset">Saved session</label>
        <select id="sessionPreset"></select>
        <label for="sessionCodeInput">Session code</label>
        <input id="sessionCodeInput" autocomplete="off" placeholder="session-2026-05-28">
        <label for="sessionLocationSelect">Location</label>
        <select id="sessionLocationSelect"></select>
        <button id="startSessionButton" type="button">Start Scanning</button>
      </form>
    </dialog>

    <dialog id="linesDialog">
      <form method="dialog" class="dialog-shell">
        <header>
          <h2>Scanned Lines</h2>
          <button value="close">Close</button>
        </header>
        <input id="lineSearch" placeholder="Search barcode, product, BIN, draft, missing BIN">
        <div id="lineList" class="line-list"></div>
      </form>
    </dialog>

    <dialog id="editDialog">
      <form method="dialog" class="dialog-shell edit-shell">
        <h2 id="editTitle">Edit Quantity</h2>
        <input id="editQuantity" inputmode="decimal" aria-label="New quantity">
        <button id="saveEditButton" type="button">Save Quantity</button>
        <button id="deleteLineButton" class="danger" type="button">Delete Line</button>
        <button value="cancel">Cancel</button>
      </form>
    </dialog>

    <dialog id="duplicateDialog">
      <form method="dialog" class="dialog-shell duplicate-shell">
        <h2>Already Scanned</h2>
        <p id="duplicateProduct"></p>
        <div class="duplicate-grid">
          <span>Existing</span>
          <strong id="duplicateExisting">0</strong>
          <span>New scan</span>
          <strong id="duplicateNew">0</strong>
        </div>
        <button id="duplicateAddButton" value="add" type="button">Add to Existing</button>
        <button id="duplicateEditButton" value="edit" type="button">Edit Existing</button>
        <button value="cancel">Cancel</button>
      </form>
    </dialog>

    <dialog id="unknownDialog">
      <form method="dialog" class="dialog-shell unknown-shell">
        <h2>Describe Unknown Product</h2>
        <p id="unknownBarcodeText"></p>
        <label for="unknownNameInput">Description</label>
        <input id="unknownNameInput" placeholder="e.g. Grey Goose 70cl bottle">
        <label for="unknownBinInput">BIN hint</label>
        <input id="unknownBinInput" placeholder="Optional">
        <button id="saveUnknownButton" type="button">Save Description</button>
        <button value="cancel">Later</button>
      </form>
    </dialog>

    <dialog id="confirmDialog">
      <form method="dialog" class="dialog-shell confirm-shell">
        <h2 id="confirmTitle">Confirm</h2>
        <p id="confirmMessage"></p>
        <button id="confirmOkButton" value="ok" type="button">Confirm</button>
        <button id="confirmCancelButton" value="cancel" type="button">Cancel</button>
      </form>
    </dialog>

    <dialog id="diagnosticsDialog">
      <form method="dialog" class="dialog-shell diagnostics-shell">
        <header>
          <h2>Scanner Diagnostics</h2>
          <button value="close">Close</button>
        </header>
        <dl id="diagnosticsList" class="diagnostics-list"></dl>
        <button id="copyDiagnosticsButton" type="button">Copy Diagnostics</button>
        <button id="resetScannerButton" type="button">Reset Scanner</button>
        <button id="clearCacheButton" class="danger" type="button">Clear Cache & Reload</button>
      </form>
    </dialog>

    <dialog id="exportDialog">
      <form method="dialog" class="dialog-shell export-shell">
        <header>
          <h2>Export Review</h2>
          <button value="close">Close</button>
        </header>
        <div id="exportSummary" class="export-summary"></div>
        <div id="missingBinList" class="missing-bin-list"></div>
        <a id="downloadExportLink" class="download-button hidden" href="#">Download Excel</a>
      </form>
    </dialog>

    <script src="/vendor/zxing-library.min.js?v=scanner-video-1"></script>
    <script src="/app.js?v=scanner-video-1" type="module"></script>
  </body>
</html>
